    <path d="M104 850 C228 814 324 826 439 790 C611 736 739 754 879 710 C1000 672 1140 676 1280 620 C1405 570 1494 555 1600 553 L1600 1067 L0 1067 L0 891 C34 878 68 862 104 850 Z" fill="#101b1e" opacity="0.76"/>
