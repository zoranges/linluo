<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1067" viewBox="0 0 1600 1067">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#91b7c4"/>
      <stop offset="0.45" stop-color="#d7b480"/>
      <stop offset="1" stop-color="#2a403f"/>
    </linearGradient>
    <radialGradient id="sun" cx="28%" cy="24%" r="45%">
      <stop offset="0" stop-color="#ffe2a8" stop-opacity="0.9"/>
      <stop offset="0.52" stop-color="#d7a057" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1b2b2f" stop-opacity="0"/>
    </radialGradient>
    <filter id="filmSoftness">
