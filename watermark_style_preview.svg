    </filter>
    <filter id="amberGlow" x="-30%" y="-70%" width="160%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.7" flood-color="#ffb11f" flood-opacity="0.72"/>
      <feDropShadow dx="0.9" dy="1" stdDeviation="0.3" flood-color="#553000" flood-opacity="0.48"/>
    </filter>
    <pattern id="grain" width="5" height="5" patternUnits="userSpaceOnUse">
